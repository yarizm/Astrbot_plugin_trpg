name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install astrbot ruff
          if [ -f astrbot_plugin_trpg/requirements.txt ]; then python -m pip install -r astrbot_plugin_trpg/requirements.txt; fi

      - name: Ruff
        run: ruff check .

      - name: Compile plugin entry
        run: python -m py_compile astrbot_plugin_trpg/main.py

      - name: Unit tests
        run: python -m unittest discover -s tests -v
